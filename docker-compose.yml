version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pokedex-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: pokedex
    ports:
      - "5432:5432"
    volumes:
      - pokedex-pgdata:/var/lib/postgresql/data

volumes:
  pokedex-pgdata:
